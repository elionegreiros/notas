<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Notas e Provas - Professor</title>
    <link rel="stylesheet" href="estilo.css">
    <!-- Biblioteca para gerar Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Gerenciador de Notas e Datas de Provas</h1>
            <p>Organização por Turma e Disciplina — 5 Turmas</p>
        </header>

        <!-- Formulário de Cadastro -->
        <section class="formulario">
            <h2>Cadastrar Dados</h2>
            <form id="formCadastro">
                <div class="campo">
                    <label for="turma">Turma:</label>
                    <select id="turma" required>
                        <option value="">Selecione a turma</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="disciplina">Disciplina:</label>
                    <select id="disciplina" required>
                        <option value="">Selecione primeiro a turma</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="nomeAluno">Nome do Aluno:</label>
                    <select id="nomeAluno" required>
                        <option value="">Selecione primeiro a turma</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="dataProva">Data da Prova:</label>
                    <input type="date" id="dataProva" required>
                </div>

                <div class="campo">
                    <label for="nota">Nota Obtida (0 a 10):</label>
                    <input type="number" id="nota" min="0" max="10" step="0.1" required placeholder="Ex: 8.5">
                </div>

                <button type="submit" class="btn">Salvar Dados</button>
            </form>
        </section>

        <!-- Filtros e Botão Exportar -->
        <section class="filtros">
            <h2>Filtrar Visualização</h2>
            <div class="filtro-grupo">
                <select id="filtroTurma">
                    <option value="todas">Todas as Turmas</option>
                </select>

                <select id="filtroDisciplina">
                    <option value="todas">Todas as Disciplinas</option>
                </select>

                <button id="btnExportar" class="btn btn-exportar">📊 Exportar para Excel</button>
            </div>
        </section>

        <!-- Área de Visualização -->
        <section class="dados">
            <h2>Dados Cadastrados</h2>
            <div id="listaDados" class="lista-vazia">Nenhum dado cadastrado ainda.</div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
